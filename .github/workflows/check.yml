name: Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build release targets
        shell: bash
        run: |
          set -euo pipefail
          for target in \
            darwin/amd64 darwin/arm64 \
            linux/amd64 linux/arm64 \
            windows/amd64 windows/arm64
          do
            GOOS="${target%/*}" \
              GOARCH="${target#*/}" \
              CGO_ENABLED=0 \
              go build -trimpath -o /tmp/pastel ./cmd/pastel
          done
